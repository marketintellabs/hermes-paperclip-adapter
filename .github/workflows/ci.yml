name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Force JS-based GitHub Actions to run under Node 24 ahead of
  # GitHub's 2026-06-02 default flip and 2026-09-16 Node-20 removal.
  # See release.yml for the full rationale.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      - name: Verify templates are shipped
        run: |
          test -f templates/mil-heartbeat.md
          test -f templates/mil-heartbeat-v2.md
