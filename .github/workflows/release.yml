name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Verify dist + shipped template
        run: test -f dist/server/execute.js && test -f templates/mil-heartbeat.md

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # MIL fork releases are all prereleases ("-mil.N" SemVer tag).
          # npm now requires an explicit dist-tag for prereleases so they
          # can't land on `latest` by accident. Publish under `mil`.
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag mil
          else
            npm publish --access public --provenance
          fi
