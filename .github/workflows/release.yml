name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Verify dist + shipped template
        run: test -f dist/server/execute.js && test -f templates/mil-heartbeat.md

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # MIL fork releases are all prereleases ("-mil.N" SemVer tag).
          # npm requires an explicit dist-tag for prereleases so they
          # can't land on `latest` by accident. We publish under `mil`
          # AND then move `latest` forward because this fork has no
          # non-prerelease stream — `latest` is effectively MIL, and
          # the npmjs.com website renders the README of whatever
          # `latest` points at.
          VERSION="$(node -p "require('./package.json').version")"
          PKG="$(node -p "require('./package.json').name")"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag mil
            npm dist-tag add "${PKG}@${VERSION}" latest
          else
            npm publish --access public --provenance
          fi

      # Create a GitHub Release on every tag push so the npmjs.com
      # "Version history" panel shows release notes (npm pulls them
      # from the repository's Releases, not from CHANGELOG or tags).
      # Skipped on workflow_dispatch since there's no tag to attach to.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # If somebody pre-created the release manually (e.g. backfill),
          # don't fail the workflow — just log and move on.
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving it alone."
            exit 0
          fi
          # --generate-notes fills in the body from merged PRs / commits
          # since the previous tag. Maintainers can edit the release
          # afterwards to add a highlights section.
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag
