name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Verify dist + shipped template
        run: test -f dist/server/execute.js && test -f templates/mil-heartbeat.md

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # MIL fork releases are all prereleases ("-mil.N" SemVer tag).
          # npm requires an explicit dist-tag for prereleases so they
          # can't land on `latest` by accident. We publish under `mil`
          # AND then move `latest` forward because this fork has no
          # non-prerelease stream — `latest` is effectively MIL, and
          # the npmjs.com website renders the README of whatever
          # `latest` points at.
          VERSION="$(node -p "require('./package.json').version")"
          PKG="$(node -p "require('./package.json').name")"
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --provenance --tag mil
            npm dist-tag add "${PKG}@${VERSION}" latest
          else
            npm publish --access public --provenance
          fi
